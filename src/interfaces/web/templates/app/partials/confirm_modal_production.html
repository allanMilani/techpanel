<div class="modal fade" id="confirmExecutionProductionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmação reforçada (production)</h5>
            </div>
            <div class="modal-body">
                <p>Digite <strong>CONFIRMAR</strong> para prosseguir.</p>
                <input id="confirmProductionInput" class="form-control" />
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="confirmProductionBtn" class="btn btn-danger" disabled>Executar em produção</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const input = document.getElementById("confirmProductionInput");
        const button = document.getElementById("confirmProductionBtn");
        if (!input || !button) return;
        input.addEventListener("input", function() {
            button.disabled = input.value.trim() !== "CONFIRMAR";
        });
    })();
</script>
