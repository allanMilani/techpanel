<table class="table table-sm align-middle">
    <thead>
        <tr>
            <th>Execução</th>
            <th>Status</th>
            <th>Ref</th>
            <th>Falha</th>
        </tr>
    </thead>
    <tbody>
        {% for item in history %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.status }}</td>
            <td>{{ item.branch_or_tag }}</td>
            <td>
                {% if item.status == "failed" %}
                <span class="text-danger fw-semibold">Passo com falha</span>
                {% else %}
                <span class="text-muted">-</span>
                {% endif %}
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="4" class="text-muted">Sem histórico.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
